name: PRUFON CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Case schema is well-formed JSON
        run: python -c "import json; json.load(open('data/schemas/case.schema.json')); print('schema ok')"
      - name: Validate case ledgers
        run: python3 scripts/validate_case_ledgers.py
