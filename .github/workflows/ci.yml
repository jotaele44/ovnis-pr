name: PRUFON CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Case schema is well-formed JSON
        run: python -c "import json; json.load(open('data/schemas/case.schema.json')); print('schema ok')"
      - name: Validate case ledgers
        run: python3 scripts/validate_case_ledgers.py
      - name: Install test dependencies
        run: python -m pip install pytest jsonschema
      - name: Run unit tests
        run: python -m pytest -q
      - name: Export canonical streams (smoke)
        run: |
          python3 scripts/federation_export.py --mode test
          test -f exports/federation/manifest.json
      - name: Production export succeeds with real case data
        run: |
          python3 scripts/federation_export.py --mode production
          test -f exports/federation/manifest.json
          echo "OK: production export completed with real case data"
